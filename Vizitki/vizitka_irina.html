<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ирина Ивановна Шаркова — Недвижимость</title>
    <style>
        /* === СБРОС СТИЛЕЙ === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === ОСНОВНОЙ ФОН === */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* === ФОНОВОЕ СВЕЧЕНИЕ === */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, -20px) rotate(3deg); }
        }

        /* === КАРТОЧКА === */
        .card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 480px;
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5),
                        0 0 80px rgba(139, 92, 246, 0.05);
            animation: cardAppear 1s ease-out;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* === АВАТАР С ФОТО === */
        .avatar {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 3px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3),
                        0 0 60px rgba(236, 72, 153, 0.15);
            animation: avatarPulse 4s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.3), 0 0 60px rgba(236, 72, 153, 0.15); }
            50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.5), 0 0 80px rgba(236, 72, 153, 0.25); }
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* === ИМЯ С ГРАДИЕНТОМ === */
        .name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.3;
            background: linear-gradient(135deg, #c084fc, #f472b6, #c084fc);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 5s ease-in-out infinite;
            margin-bottom: 8px;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* === СПЕЦИАЛИЗАЦИЯ === */
        .title {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .specialization {
            color: rgba(255,255,255,0.75);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .specialization .highlight {
            color: #c084fc;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .specialization .highlight:hover {
            color: #e0b3ff;
            text-shadow: 0 0 15px rgba(192, 132, 252, 0.5);
        }

        /* === РАЗДЕЛИТЕЛЬ === */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
            margin: 0 auto 35px;
        }

        /* === ИКОНКИ СОЦСЕТЕЙ === */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .social-link {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            fill: rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.2);
            background: rgba(139, 92, 246, 0.1);
        }

        .social-link:hover svg {
            fill: #c084fc;
        }

        .social-link.telegram:hover {
            border-color: rgba(38, 165, 227, 0.4);
            box-shadow: 0 8px 25px rgba(38, 165, 227, 0.2);
            background: rgba(38, 165, 227, 0.1);
        }

        .social-link.telegram:hover svg {
            fill: #26a5e4;
        }

        .social-link.whatsapp:hover {
            border-color: rgba(37, 211, 102, 0.4);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.2);
            background: rgba(37, 211, 102, 0.1);
        }

        .social-link.whatsapp:hover svg {
            fill: #25d366;
        }

        .social-link.email:hover {
            border-color: rgba(236, 72, 153, 0.4);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.2);
            background: rgba(236, 72, 153, 0.1);
        }

        .social-link.email:hover svg {
            fill: #ec4899;
        }

        /* === ПОДПИСИ ПОД ИКОНКАМИ === */
        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .social-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.5px;
        }

        /* === КНОПКА "НАПИСАТЬ МНЕ" === */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(139, 92, 246, 0.4),
                        0 0 60px rgba(236, 72, 153, 0.15);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        .cta-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* === ФУТЕР === */
        .footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* === АДАПТИВНОСТЬ ДЛЯ ТЕЛЕФОНОВ === */
        @media (max-width: 520px) {
            .card {
                padding: 40px 25px;
                border-radius: 20px;
            }

            .name {
                font-size: 1.6rem;
            }

            .specialization {
                font-size: 1rem;
            }

            .cta-button {
                padding: 14px 32px;
                font-size: 0.95rem;
                width: 100%;
                justify-content: center;
            }

            .socials {
                gap: 14px;
            }

            .social-link {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
