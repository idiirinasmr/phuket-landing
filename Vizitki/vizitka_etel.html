<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Этель Аданье — Эксперт по омоложению</title>
    <style>
        /* === СБРОС СТИЛЕЙ === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === ОСНОВНОЙ ФОН === */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a0533;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* === ФОНОВОЕ СВЕЧЕНИЕ === */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(212, 175, 55, 0.07) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(56, 189, 172, 0.06) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, -20px) rotate(3deg); }
        }

        /* === КАРТОЧКА === */
        .card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 480px;
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5),
                        0 0 80px rgba(212, 175, 55, 0.05);
            animation: cardAppear 1s ease-out;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* === АВАТАР === */
        .avatar {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #38bdac);
            padding: 3px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3),
                        0 0 60px rgba(56, 189, 172, 0.15);
            animation: avatarPulse 4s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), 0 0 60px rgba(56, 189, 172, 0.15); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.5), 0 0 80px rgba(56, 189, 172, 0.25); }
        }

        .avatar svg {
            width: 70px;
            height: 70px;
            fill: white;
        }

        /* === ИМЯ С ГРАДИЕНТОМ === */
        .name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.3;
            background: linear-gradient(135deg, #f0d68a, #38bdac, #f0d68a);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 5s ease-in-out infinite;
            margin-bottom: 12px;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* === СПЕЦИАЛИЗАЦИЯ === */
        .title {
            color: rgba(255,255,255,0.55);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .specialization {
            color: #f0d68a;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .specialization .highlight {
            color: #f0d68a;
            font-weight: 600;
        }

        .motto {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 35px;
        }

        /* === РАЗДЕЛИТЕЛЬ === */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
            margin: 0 auto 35px;
        }

        /* === ИКОНКИ СОЦСЕТЕЙ === */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .social-link {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            fill: rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-4px);
        }

        .social-link.telegram:hover {
            border-color: rgba(38, 165, 227, 0.4);
            box-shadow: 0 8px 25px rgba(38, 165, 227, 0.2);
            background: rgba(38, 165, 227, 0.1);
        }

        .social-link.telegram:hover svg {
            fill: #26a5e4;
        }

        .social-link.whatsapp:hover {
            border-color: rgba(37, 211, 102, 0.4);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.2);
            background: rgba(37, 211, 102, 0.1);
        }

        .social-link.whatsapp:hover svg {
            fill: #25d366;
        }

        .social-link.email:hover {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
            background: rgba(212, 175, 55, 0.1);
        }

        .social-link.email:hover svg {
            fill: #f0d68a;
        }

        /* === ПОДПИСИ ПОД ИКОНКАМИ === */
        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .social-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.5px;
        }

        /* === КНОПКА "НАПИСАТЬ МНЕ" === */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #d4af37, #38bdac);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4),
                        0 0 60px rgba(56, 189, 172, 0.15);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        .cta-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* === ФУТЕР === */
        .footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* === АДАПТИВНОСТЬ ДЛЯ ТЕЛЕФОНОВ === */
        @media (max-width: 520px) {
            .card {
                padding: 40px 25px;
                border-radius: 20px;
            }

            .name {
                font-size: 1.7rem;
            }

            .specialization {
            color: #f0d68a;
            }

            .cta-button {
                padding: 14px 32px;
                font-size: 0.95rem;
                width: 100%;
                justify-content: center;
            }

            .socials {
                gap: 14px;
            }

            .social-link {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
